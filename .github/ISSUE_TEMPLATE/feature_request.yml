name: ✨ Feature Request
description: Suggest an idea or enhancement for fossil
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.

  - type: dropdown
    id: phase
    attributes:
      label: Relevant Phase
      description: Which development phase does this relate to?
      options:
        - "Phase 1: Python Forensics"
        - "Phase 2: Multi-Language + Scan"
        - "Phase 3: GitHub/GitLab + PR Generation"
        - "Phase 4: LLM Narration + Polish"
        - "New / Out of scope"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples.
